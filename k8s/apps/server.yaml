apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-deployment
  labels: 
    app: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
      - name: server
        image: kushal/server:1.0 
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: appsecret
          
---
apiVersion: v1
kind: Service
metadata:
  name: server-service
spec:
  selector:
    app: server
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
