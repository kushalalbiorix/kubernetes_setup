apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-deployment
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka 
    spec:
      containers:
      - name: kafka  
        image: wurstmeister/kafka:latest
        ports:
        - containerPort: 9092
        envFrom:
        - secretRef:
            name: appsecret

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
spec:
  selector:
    app: kafka 
  ports:
    - protocol: TCP
      port: 9092
      targetPort: 9092  

